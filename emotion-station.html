<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="description" content="情绪补给站 · 青少年心灵Spa：先把难过的话丢给云朵消化，再听听父母真正的意思。" />
<title>☁️ 情绪补给站 · 心灵Spa</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&family=Noto+Serif+SC:wght@500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
<style>
  /* ============ 0. 设计变量 ============ */
  :root{
    --c-cream:  #FFFBF5;      /* 奶油白 背景 */
    --c-cream2: #FFF4E4;      /* 次级奶油 */
    --c-purple-1:#F2EBFF;     /* 淡紫 最浅 */
    --c-purple-2:#E0D0FF;     /* 淡紫 浅 */
    --c-purple-3:#C9B8FF;     /* 淡紫 主 */
    --c-purple-4:#9E86E0;     /* 淡紫 标题 */
    --c-purple-5:#6F54B8;     /* 淡紫 深 */
    --c-yellow-1:#FFF6CC;     /* 暖黄 最浅 */
    --c-yellow-2:#FFE99C;     /* 暖黄 浅 */
    --c-yellow-3:#FFD66D;     /* 暖黄 主 */
    --c-pink-1:  #FFE3EA;
    --c-pink-2:  #FFC6D4;
    --c-text-1:  #4D3F5C;     /* 主文 深紫灰 */
    --c-text-2:  #7E6F8E;     /* 次文 */
    --c-text-3:  #A89AB8;     /* 弱文 */
    --r-sm:14px; --r-md:20px; --r-lg:28px; --r-xl:36px; --r-pill:999px;

    --sh-soft:  0 10px 28px rgba(110,84,184,.10), 0 2px 8px rgba(77,63,92,.06);
    --sh-card:  0 14px 40px rgba(158,134,224,.14), 0 4px 12px rgba(77,63,92,.06);
    --sh-btn:   0 10px 22px rgba(158,134,224,.22), 0 4px 10px rgba(255,214,109,.20), inset 0 1px 0 rgba(255,255,255,.6);
    --sh-btn-h: 0 16px 36px rgba(158,134,224,.30), 0 8px 18px rgba(255,214,109,.28), inset 0 1px 0 rgba(255,255,255,.6);

    --font-disp: 'Ma Shan Zheng','ZCOOL KuaiLe','Noto Serif SC','STKaiti',serif;
    --font-se:   'Noto Serif SC','Source Han Serif SC','SimSun',serif;
    --font-body: 'Noto Sans SC','PingFang SC','Microsoft YaHei',system-ui,-apple-system,sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--font-body);
    color:var(--c-text-1);
    font-size:16px;
    line-height:1.75;
    background:
      radial-gradient(900px 600px at -10% -10%, #E0D0FF 0%, transparent 60%),
      radial-gradient(800px 600px at 110% 10%, #FFE99C 0%, transparent 55%),
      radial-gradient(700px 600px at 50% 120%, #FFE3EA 0%, transparent 55%),
      linear-gradient(180deg, #FFFBF5 0%, #FFF7EC 100%);
    background-attachment:fixed;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  textarea{font-family:inherit}
  .hidden{display:none !important}

  /* ============ 1. 背景漂浮装饰 ============ */
  .bg-orb{position:fixed;border-radius:50%;filter:blur(50px);opacity:.7;pointer-events:none;z-index:0;animation:floatOrb 18s ease-in-out infinite}
  .bg-o1{width:480px;height:480px;top:-160px;left:-120px;background:radial-gradient(circle,#E0D0FF,transparent 70%);animation-delay:-2s}
  .bg-o2{width:400px;height:400px;top:30vh;right:-140px;background:radial-gradient(circle,#FFE99C,transparent 70%);animation-delay:-6s}
  .bg-o3{width:420px;height:420px;bottom:-180px;left:30vw;background:radial-gradient(circle,#FFC6D4,transparent 70%);animation-delay:-10s}
  @keyframes floatOrb{0%,100%{transform:translate3d(0,0,0) scale(1)}50%{transform:translate3d(0,-30px,0) scale(1.06)}}

  /* ============ 2. 顶部 Hero ============ */
  .hero{position:relative;z-index:2;text-align:center;padding:48px 24px 20px}
  .hero h1{
    margin:0;font-family:var(--font-disp);font-weight:400;letter-spacing:2px;
    font-size:clamp(34px, 6vw, 60px);
    background:linear-gradient(135deg,#9E86E0 0%,#C99FE0 50%,#E9B74A 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;
    filter: drop-shadow(0 2px 0 rgba(255,255,255,.5));
  }
  .hero h1 .emoji{-webkit-text-fill-color:initial;display:inline-block;animation:bob 4s ease-in-out infinite;margin-right:6px}
  .hero p.sub{margin:6px 0 0;color:var(--c-text-2);font-family:var(--font-se);font-size:clamp(15px,1.8vw,19px);letter-spacing:1px}
  .hero p.lead{margin:4px 0 0;color:var(--c-text-3);font-size:clamp(13px,1.3vw,14.5px)}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

  /* ============ 3. 主容器 ============ */
  .page{position:relative;z-index:2;max-width:960px;margin:0 auto;padding:12px 24px 48px}

  /* --- 输入卡片 --- */
  .card{
    position:relative;background:linear-gradient(180deg,#FFFFFF,#FFFBF5);
    border:1px solid rgba(201,184,255,.45);
    border-radius:var(--r-xl);padding:28px 26px 26px;
    box-shadow:var(--sh-card);
  }
  .card::after{ /* 手绘风虚线描边（内层） */
    content:"";position:absolute;inset:8px;border-radius:calc(var(--r-xl) - 8px);
    border:2px dashed rgba(201,184,255,.45);pointer-events:none;
  }
  .card-label{display:flex;align-items:center;gap:10px;font-family:var(--font-se);font-size:19px;font-weight:700;color:var(--c-purple-5)}
  .card-label .ico{font-size:22px;filter:drop-shadow(0 2px 3px rgba(158,134,224,.25))}
  .card-hint{color:var(--c-text-2);font-size:14px;margin:6px 0 16px}

  textarea#input{
    width:100%;min-height:160px;resize:vertical;
    padding:18px 18px;border:2px solid var(--c-purple-2);
    background:linear-gradient(180deg,#FFFFFF,#F2EBFF 120%);
    color:var(--c-text-1);font-size:16.5px;line-height:1.85;
    border-radius:var(--r-lg);outline:none;transition:border-color .25s ease,box-shadow .25s ease;
    box-shadow:inset 0 2px 8px rgba(158,134,224,.08), 0 1px 0 rgba(255,255,255,1);
  }
  textarea#input::placeholder{color:var(--c-text-3)}
  textarea#input:focus{border-color:var(--c-purple-3);box-shadow:0 0 0 6px rgba(201,184,255,.22), inset 0 2px 6px rgba(158,134,224,.05)}
  textarea#input.is-eaten{animation:eatText .9s ease forwards}
  @keyframes eatText{
    0%  {opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
    50% {opacity:.6;transform:translateY(-24px) scale(.96);filter:blur(1.2px)}
    100%{opacity:0;transform:translateY(-60px) scale(.8);filter:blur(3px)}
  }
  .input-meta{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
  .counter{padding:4px 14px;border-radius:var(--r-pill);background:var(--c-purple-1);color:var(--c-purple-5);font-size:12.5px;font-weight:600}
  .counter.warn{background:#FFE0DC;color:#B43522}
  .btn-clear{min-height:36px;padding:0 14px;border-radius:var(--r-pill);color:var(--c-text-2);font-size:13.5px}
  .btn-clear:hover{background:#FFE3EA;color:#B43522}

  /* --- Step 1 按钮 --- */
  .stage1{margin-top:22px;text-align:center}
  .btn-primary{
    position:relative;display:inline-flex;align-items:center;gap:10px;
    min-width:220px;min-height:58px;padding:0 34px;
    border-radius:var(--r-pill);
    color:#FFFFFF;font-family:var(--font-se);font-size:18px;font-weight:700;letter-spacing:1px;
    background:linear-gradient(135deg,#C9B8FF 0%,#9E86E0 55%,#FFD66D 130%);
    box-shadow:var(--sh-btn);
    transition:transform .18s ease,box-shadow .28s ease,filter .2s ease;
    transform: rotate(-.6deg);
  }
  .btn-primary::before{content:"";position:absolute;inset:0;border-radius:inherit;background:radial-gradient(300px 60px at 20% 20%,rgba(255,255,255,.5),transparent 60%);pointer-events:none}
  .btn-primary:hover{transform:translateY(-2px) rotate(-.6deg) scale(1.02);box-shadow:var(--sh-btn-h);filter:brightness(1.03)}
  .btn-primary:active{transform:translateY(0) rotate(-.6deg) scale(.97);filter:brightness(.99)}
  .btn-primary[disabled]{opacity:.7;cursor:not-allowed;transform:none}
  .btn-primary .ico{font-size:22px;filter:drop-shadow(0 2px 2px rgba(0,0,0,.12))}

  /* ============ 4. 云朵舞台 ============ */
  .stage{
    position:relative;margin:38px auto 0;padding:20px 10px 10px;
    display:flex;flex-direction:column;align-items:center;gap:18px;
  }

  /* --- 云朵（纯CSS） --- */
  .cloud{
    position:relative;width:240px;height:96px;border-radius:120px;
    background:linear-gradient(180deg,#F5F2FA,#D7D2E3);
    box-shadow:
      inset 0 -10px 18px rgba(110,84,184,.08),
      0 16px 30px rgba(110,84,184,.15);
    transition:background .6s ease,box-shadow .6s ease;
  }
  .cloud::before, .cloud::after{
    content:"";position:absolute;border-radius:50%;
    background:inherit;box-shadow:inherit;
  }
  .cloud::before{width:110px;height:110px;top:-50px;left:36px;
    box-shadow:80px -10px 0 -10px currentColor, inset 0 -10px 18px rgba(110,84,184,.06);
    background:inherit;color:#F5F2FA;
  }
  .cloud::after{width:140px;height:140px;top:-70px;right:20px;
    background:inherit;
    box-shadow:inset 0 -10px 18px rgba(110,84,184,.06);
  }
  /* 补一个左后云朵凸起 */
  .cloud .bump{position:absolute;width:92px;height:92px;border-radius:50%;background:inherit;top:-30px;left:-10px;box-shadow:inset 0 -8px 16px rgba(110,84,184,.06)}
  .cloud .face{
    position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);
    display:flex;flex-direction:column;align-items:center;gap:6px;z-index:3;
    color:#5B4D6E;font-family:var(--font-disp);font-size:20px;
    transition:color .4s ease;
  }
  .cloud .eyes{display:flex;gap:22px;font-size:10px}
  .cloud .eyes i{width:10px;height:10px;border-radius:50%;background:#5B4D6E;display:inline-block}
  .cloud .mouth{width:18px;height:8px;border-bottom-left-radius:16px;border-bottom-right-radius:16px;border-bottom:3px solid #5B4D6E;border-left:3px solid transparent;border-right:3px solid transparent}

  /* 晃动动画 */
  .cloud.shake{animation:cloudShake .85s ease}
  @keyframes cloudShake{
    0%{transform:translateX(0) rotate(0)}
    18%{transform:translateX(-12px) rotate(-4deg)}
    36%{transform:translateX(14px)  rotate(5deg)}
    54%{transform:translateX(-10px) rotate(-3deg)}
    72%{transform:translateX(10px)  rotate(4deg)}
    100%{transform:translateX(0) rotate(0)}
  }
  /* 彩虹云朵 */
  .cloud.rainbow{
    background:
      linear-gradient(135deg,#FFD6E0 0%,#FFE99C 22%,#FFF3BF 42%,#BFE7D0 60%,#C7D9FA 78%,#E1C7F7 100%);
    box-shadow:
      inset 0 -10px 18px rgba(255,255,255,.35),
      0 18px 38px rgba(196,147,228,.22),
      0 0 0 6px rgba(255,255,255,.35);
    animation:rainbowGlow 4.5s ease-in-out infinite;
  }
  .cloud.rainbow::before,.cloud.rainbow::after,.cloud.rainbow .bump{
    background:inherit;
  }
  .cloud.rainbow .face{color:#6F54B8}
  .cloud.rainbow .eyes i{background:#6F54B8}
  .cloud.rainbow .mouth{border-color:#6F54B8;border-top-color:transparent;border-left-color:transparent;border-right-color:transparent}
  @keyframes rainbowGlow{
    0%,100%{filter:brightness(1) saturate(1)}
    50%{filter:brightness(1.05) saturate(1.12)}
  }

  /* --- 安慰语气泡 --- */
  .bubble-comfort{
    margin-top:10px;
    position:relative;max-width:560px;padding:18px 24px;border-radius:26px;
    background:linear-gradient(180deg,#FFFFFF,#FFF6CC);
    border:2px dashed var(--c-yellow-2);
    box-shadow:0 12px 26px rgba(233,183,74,.18);
    font-family:var(--font-disp);font-size:clamp(18px,2.3vw,24px);
    color:var(--c-purple-5);text-align:center;letter-spacing:1px;
    transform-origin:top center;
    animation:bubblePop .6s cubic-bezier(.2,1.6,.4,1) both;
  }
  .bubble-comfort::before{
    content:"";position:absolute;top:-16px;left:50%;transform:translateX(-50%);
    width:0;height:0;border:10px solid transparent;border-bottom-color:var(--c-yellow-2);
  }
  .bubble-comfort::after{
    content:"";position:absolute;top:-12px;left:50%;transform:translateX(-50%);
    width:0;height:0;border:8px solid transparent;border-bottom-color:#FFF6CC;
  }
  @keyframes bubblePop{
    0%  {opacity:0;transform:scale(.4) translateY(-6px)}
    60% {opacity:1;transform:scale(1.08) translateY(0)}
    100%{opacity:1;transform:scale(1) translateY(0)}
  }
  .bubble-comfort small{display:block;margin-top:6px;font-family:var(--font-body);font-size:13px;color:var(--c-text-2);letter-spacing:0;font-weight:400}

  /* --- Step 2 按钮 --- */
  .stage2-btn{
    min-height:52px;padding:0 26px;border-radius:var(--r-pill);
    font-family:var(--font-se);font-size:16px;font-weight:700;
    color:var(--c-purple-5);
    background:linear-gradient(180deg,#FFFFFF,#F2EBFF);
    border:2px solid var(--c-purple-2);
    box-shadow:0 10px 22px rgba(158,134,224,.16), inset 0 1px 0 rgba(255,255,255,.7);
    transition:transform .18s ease,box-shadow .25s ease,background .2s ease;
    transform:rotate(.5deg);
    animation:fadeSlideUp .5s .1s ease both;
  }
  .stage2-btn:hover{transform:translateY(-2px) rotate(.5deg) scale(1.02);background:linear-gradient(180deg,#FFFFFF,#E0D0FF);box-shadow:0 14px 30px rgba(158,134,224,.22)}
  .stage2-btn:active{transform:translateY(0) rotate(.5deg) scale(.98)}
  .stage2-btn[disabled]{opacity:.65;cursor:not-allowed;transform:none}

  /* --- 结果翻译卡 --- */
  .card-result{margin-top:10px}
  .card-result .quote{
    position:relative;margin:10px 0 0;padding:20px 22px;border-radius:var(--r-lg);
    background:linear-gradient(180deg,#FFFFFF,#F2EBFF);
    border:1px solid rgba(201,184,255,.5);
    color:var(--c-text-1);font-family:var(--font-se);font-size:17.5px;line-height:1.95;
    animation:fadeSlideUp .55s ease both;
  }
  .card-result .quote::before,.card-result .quote::after{
    content:"“";position:absolute;font-family:Georgia,serif;font-size:54px;color:var(--c-purple-3);line-height:1;opacity:.9
  }
  .card-result .quote::before{top:-2px;left:10px}
  .card-result .quote::after{content:"”";right:14px;bottom:-22px;top:auto}
  .card-result .original{
    margin-top:14px;padding:10px 14px;border-radius:var(--r-md);
    background:var(--c-yellow-1);color:var(--c-text-2);font-size:13.5px;border:1px dashed var(--c-yellow-2)
  }
  .card-result .original b{color:var(--c-text-1);font-weight:600;margin-right:6px}
  .card-result .again{
    display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px;
  }
  .btn-ghost{min-height:44px;padding:0 20px;border-radius:var(--r-pill);background:#FFFFFF;border:1px solid var(--c-purple-2);color:var(--c-purple-5);font-weight:600;font-size:14.5px;box-shadow:0 4px 10px rgba(158,134,224,.1)}
  .btn-ghost:hover{background:#F2EBFF;transform:translateY(-1px)}

  @keyframes fadeSlideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

  /* ============ 5. 底部成长足迹 ============ */
  .footer{
    position:relative;z-index:2;margin:34px auto 0;max-width:680px;padding:22px 24px 32px;text-align:center
  }
  .growth{
    display:inline-flex;align-items:center;gap:12px;
    padding:12px 22px;border-radius:var(--r-pill);
    background:linear-gradient(135deg,#FFF6CC,#F2EBFF);
    border:2px dashed rgba(201,184,255,.5);
    box-shadow:var(--sh-soft);
    font-family:var(--font-disp);font-size:clamp(15px,2vw,18.5px);color:var(--c-purple-5);letter-spacing:1px;
  }
  .growth .num{
    display:inline-flex;align-items:center;justify-content:center;
    min-width:34px;height:34px;padding:0 10px;border-radius:50%;
    background:linear-gradient(135deg,#FFD66D,#FF9AA8);
    color:#FFFFFF;font-family:var(--font-se);font-size:17px;font-weight:800;
    box-shadow:0 6px 14px rgba(233,183,74,.3);
    text-shadow:0 1px 0 rgba(0,0,0,.08);
  }
  .footer .slogan{margin-top:14px;color:var(--c-text-3);font-size:13px}

  /* ============ 6. Toast ============ */
  .toast-host{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:10px;max-width:min(92vw,440px);pointer-events:none}
  .toast{
    padding:10px 18px;border-radius:var(--r-pill);font-size:14.5px;font-weight:500;
    box-shadow:0 12px 28px rgba(77,63,92,.18);
    opacity:0;transform:translateY(-14px);transition:opacity .3s ease,transform .3s ease;pointer-events:auto;
    display:inline-flex;align-items:center;gap:8px
  }
  .toast.is-in{opacity:1;transform:translateY(0)}
  .toast.info{background:#FFFFFF;color:var(--c-purple-5);border:1px solid var(--c-purple-2)}
  .toast.ok{background:#E6F6EC;color:#2E7D4C;border:1px solid #B5E4C4}
  .toast.warn{background:#FFF1E0;color:#8A5A2B;border:1px solid #FFD8A5}

/* ============ X. 增强交互动画 ============ */

/* ---- X-1. 背景装饰云（缓慢漂移） ---- */
.bg-cloud{
  position:fixed;z-index:0;pointer-events:none;opacity:.7;
  width:160px;height:64px;border-radius:999px;
  background:linear-gradient(180deg,#FFFFFF,#F2EBFF);
  box-shadow:inset 0 -6px 14px rgba(158,134,224,.14), 0 8px 20px rgba(158,134,224,.10);
  filter:blur(.4px);
}
.bg-cloud::before,.bg-cloud::after{content:"";position:absolute;border-radius:50%;background:inherit;box-shadow:inherit}
.bg-cloud::before{width:70px;height:70px;top:-32px;left:24px}
.bg-cloud::after{width:92px;height:92px;top:-44px;right:14px}
.bg-cloud.c1{top:22vh;left:-180px;animation:driftCloud 55s linear infinite;animation-delay:-5s;transform:scale(.9)}
.bg-cloud.c2{top:58vh;right:-160px;width:140px;height:56px;animation:driftCloud 70s linear infinite reverse;animation-delay:-20s;transform:scale(.78);opacity:.55}
.bg-cloud.c3{top:82vh;left:30vw;width:120px;height:48px;animation:driftCloud 85s linear infinite;animation-delay:-40s;transform:scale(.66);opacity:.45}
@keyframes driftCloud{
  0%  {transform:translateX(0) translateY(0) scale(var(--s,1))}
  50% {transform:translateX(60vw) translateY(-14px) scale(var(--s,1))}
  100%{transform:translateX(120vw) translateY(6px) scale(var(--s,1))}
}

/* ---- X-2. 页面分步入场 ---- */
.hero, .card, .stage, .footer{opacity:0;transform:translateY(24px);will-change:opacity,transform}
body.is-ready .hero  {animation:staggerIn .7s  0ms cubic-bezier(.2,.8,.2,1) both}
body.is-ready .card  {animation:staggerIn .7s 90ms cubic-bezier(.2,.8,.2,1) both}
body.is-ready .stage {animation:staggerIn .7s 200ms cubic-bezier(.2,.8,.2,1) both}
body.is-ready .footer{animation:staggerIn .7s 320ms cubic-bezier(.2,.8,.2,1) both}
@keyframes staggerIn{from{opacity:0;transform:translateY(24px) scale(.99)}to{opacity:1;transform:translateY(0) scale(1)}}

/* ---- X-3. 输入框 focus 发光 + 错误晃动 ---- */
textarea#input{transition:border-color .25s ease,box-shadow .28s ease,transform .18s ease}
textarea#input:focus{border-color:var(--c-purple-4);transform:scale(1.006);box-shadow:0 0 0 8px rgba(201,184,255,.25), 0 8px 24px rgba(158,134,224,.14), inset 0 2px 6px rgba(158,134,224,.06)}
textarea#input.is-shake{animation:shakeErr .45s ease both;border-color:#FFB5A8;box-shadow:0 0 0 6px rgba(255,160,150,.25), inset 0 2px 6px rgba(180,53,34,.08)}
@keyframes shakeErr{
  0%,100%{transform:translateX(0)}
  18%{transform:translateX(-9px) rotate(-.3deg)}
  38%{transform:translateX(8px)  rotate(.3deg)}
  58%{transform:translateX(-6px) rotate(-.2deg)}
  78%{transform:translateX(5px)  rotate(.2deg)}
}
.counter{transition:transform .2s ease,background .2s ease,color .2s ease}
.counter.is-pop{animation:counterPop .45s ease both}
@keyframes counterPop{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}

/* ---- X-4. 按钮水波 Ripple + 高光扫过 Shine ---- */
.btn-primary, .stage2-btn, .btn-ghost, .btn-clear{position:relative;overflow:hidden}
.btn-primary::after{
  content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:linear-gradient(120deg,transparent 0%,rgba(255,255,255,.65) 50%,transparent 100%);
  transform:translateX(-130%);
}
.btn-primary:hover::after{animation:shineSweep 1.1s cubic-bezier(.2,.8,.2,1) both}
@keyframes shineSweep{0%{transform:translateX(-130%)}100%{transform:translateX(130%)}}
.ripple{
  position:absolute;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,rgba(255,255,255,.85),rgba(255,255,255,.25) 40%,transparent 70%);
  transform:scale(0);animation:rippleExpand .65s ease-out both;
  mix-blend-mode:screen;
}
.stage2-btn .ripple, .btn-ghost .ripple, .btn-clear .ripple{background:radial-gradient(circle,rgba(158,134,224,.45),rgba(158,134,224,.12) 40%,transparent 70%);mix-blend-mode:multiply}
@keyframes rippleExpand{from{transform:scale(0);opacity:1}to{transform:scale(4);opacity:0}}
.btn-clear:hover{animation:wiggle .7s ease both}
@keyframes wiggle{
  0%,100%{transform:rotate(0)}
  25%{transform:rotate(-5deg)}
  50%{transform:rotate(4deg)}
  75%{transform:rotate(-2deg)}
}

/* ---- X-5. 云朵增强：呼吸漂浮 + 眨眼 + 吃字张嘴 + 彩虹火花 ---- */
.cloud{animation:cloudBob 5.5s ease-in-out infinite}
@keyframes cloudBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.cloud .eyes i{animation:blink 5.5s ease-in-out infinite;transform-origin:center}
.cloud .eyes i:nth-child(2){animation-delay:.3s}
@keyframes blink{
  0%,92%,100%{transform:scaleY(1)}
  94%,98%{transform:scaleY(.1)}
}
.cloud.eating .mouth{animation:mouthChew .8s ease-in-out;transform-origin:center}
@keyframes mouthChew{
  0%,100%{transform:scale(1)}
  25%{transform:scale(2.4,2.4) translateY(1px)}
  45%{transform:scale(1.3,1.5)}
  65%{transform:scale(2.2,2.1) translateY(1px)}
  85%{transform:scale(1.2,1.3)}
}
.cloud .spark{
  position:absolute;left:50%;top:40%;
  width:10px;height:10px;border-radius:50%;
  background:radial-gradient(circle,#FFFFFF 0%,#FFE99C 40%,rgba(255,233,156,0) 70%);
  pointer-events:none;z-index:2;
  transform:translate(-50%,-50%);
  filter:drop-shadow(0 0 6px rgba(255,214,109,.8));
}
.cloud.rainbow .spark{animation:sparkFly 1.2s cubic-bezier(.2,.8,.2,1) both}
.cloud.rainbow .spark.s1{animation-delay:0ms;   --dx:-90px; --dy:-120px; --rot:-45deg; --dly:0}
.cloud.rainbow .spark.s2{animation-delay:60ms;  --dx: 60px; --dy:-130px; --rot: 30deg; --dly:0}
.cloud.rainbow .spark.s3{animation-delay:120ms; --dx:-140px;--dy:-60px;  --rot:-20deg; --dly:0}
.cloud.rainbow .spark.s4{animation-delay:180ms; --dx: 120px;--dy:-70px;  --rot: 25deg; --dly:0}
.cloud.rainbow .spark.s5{animation-delay:240ms; --dx: 0px;  --dy:-160px; --rot: 0deg;  --dly:0}
.cloud.rainbow .spark.s6{animation-delay:300ms; --dx:-40px; --dy:-80px;  --rot:-15deg; --dly:0}
@keyframes sparkFly{
  0%  {opacity:0;transform:translate(-50%,-50%) scale(.3) rotate(0)}
  20% {opacity:1;transform:translate(calc(-50% + var(--dx) * .25), calc(-50% + var(--dy) * .25)) scale(.9) rotate(calc(var(--rot) * .25))}
  100%{opacity:0;transform:translate(calc(-50% + var(--dx)),      calc(-50% + var(--dy)))      scale(1.4) rotate(var(--rot))}
}

/* ---- X-6. 安慰语：弹出后持续浮动 + 文字逐字淡入 ---- */
.bubble-comfort{animation:bubblePop .6s cubic-bezier(.2,1.6,.4,1) both, bubbleFloat 4.5s 1.2s ease-in-out infinite}
@keyframes bubbleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.bubble-comfort .ch{display:inline-block;opacity:0;transform:translateY(8px) scale(.9);animation:chIn .4s cubic-bezier(.2,.8,.2,1) forwards}
@keyframes chIn{to{opacity:1;transform:translateY(0) scale(1)}}

/* ---- X-7. 翻译卡片：引号入场 + 内容分步 + 场景徽章滑入 ---- */
.card-result .quote{position:relative;overflow:hidden}
.card-result .quote::before{animation:quoteMarkIn .6s .05s cubic-bezier(.2,.8,.2,1) both}
.card-result .quote::after {animation:quoteMarkIn .6s .20s cubic-bezier(.2,.8,.2,1) both}
@keyframes quoteMarkIn{from{opacity:0;transform:translateY(8px) rotate(-18deg) scale(.7)}to{opacity:.9;transform:translateY(0) rotate(0) scale(1)}}
.card-result .quote .ch{display:inline-block;opacity:0;transform:translateY(6px);animation:chIn .35s ease forwards}
.card-result .original .tag-scene{display:inline-block;margin-left:6px;padding:2px 10px;border-radius:var(--r-pill);background:linear-gradient(135deg,#F2EBFF,#FFF6CC);color:var(--c-purple-5);font-size:12px;font-weight:600;animation:sceneTagSlide .5s .15s cubic-bezier(.2,.8,.2,1) both}
@keyframes sceneTagSlide{from{opacity:0;transform:translateX(-12px) scale(.9)}to{opacity:1;transform:translateX(0) scale(1)}}
.card-result .again{opacity:0;animation:fadeSlideUp .5s .4s ease both}

/* ---- X-8. 成长计数：数字弹跳 + 星星飞出 ---- */
.growth .num{transition:transform .2s ease,box-shadow .2s ease}
.growth .num.pop{animation:numPop .65s cubic-bezier(.2,1.8,.3,1) both;box-shadow:0 10px 22px rgba(233,183,74,.4), 0 0 0 4px rgba(255,214,109,.25)}
@keyframes numPop{
  0%  {transform:scale(1)}
  30% {transform:scale(1.45) rotate(-6deg)}
  60% {transform:scale(.95) rotate(3deg)}
  100%{transform:scale(1) rotate(0)}
}
.growth{position:relative}
.growth .fly-star{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  font-size:14px;pointer-events:none;z-index:3;
  filter:drop-shadow(0 2px 4px rgba(233,183,74,.4));
  animation:starFly 1s cubic-bezier(.2,.8,.2,1) both;
}
@keyframes starFly{
  0%  {opacity:0;transform:translate(-50%,-50%) scale(.2) rotate(0)}
  25% {opacity:1}
  100%{opacity:0;transform:translate(calc(-50% + var(--sx)), calc(-50% + var(--sy))) scale(1.2) rotate(var(--sr,180deg))}
}

/* ============ 7. 响应式 ============ */
  @media (max-width:640px){
    .hero{padding:36px 18px 10px}
    .page{padding:6px 16px 36px}
    .card{padding:22px 18px 20px;border-radius:28px}
    textarea#input{min-height:140px;font-size:15.5px;padding:14px}
    .btn-primary{width:100%;min-width:0;justify-content:center;transform:none}
    .btn-primary:hover{transform:translateY(-2px) scale(1.01)}
    .cloud{transform:scale(.88)}
    .card-result .quote{font-size:16px;padding:18px}
  }

  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.001ms !important}
    .bg-orb,.hero h1 .emoji,.cloud.rainbow{animation:none !important}
  }
</style>
</head>
<body>

  <div class="bg-orb bg-o1" aria-hidden="true"></div>
  <div class="bg-orb bg-o2" aria-hidden="true"></div>
  <div class="bg-orb bg-o3" aria-hidden="true"></div>
  <div class="bg-cloud c1" aria-hidden="true"></div>
  <div class="bg-cloud c2" aria-hidden="true"></div>
  <div class="bg-cloud c3" aria-hidden="true"></div>

  <!-- 顶部 -->
  <header class="hero">
    <h1><span class="emoji">☁️</span>情绪补给站</h1>
    <p class="sub">先安抚情绪，再理解真相</p>
    <p class="lead">把伤人的话丢给云朵消化一下，我们再一起看看真正的意思 ✿</p>
  </header>

  <main class="page">
    <!-- 输入卡片 -->
    <section class="card" aria-label="情绪输入卡片">
      <div class="card-label"><span class="ico">💭</span><span>把扎心的话，先写在这里…</span></div>
      <p class="card-hint">别担心写得多难听，云朵会把它变成彩虹糖的味道 🌈</p>

      <textarea id="input" maxlength="400" rows="6" placeholder="把爸妈或别人让你难过的那句话贴在这里..."></textarea>

      <div class="input-meta">
        <span id="counter" class="counter">0 / 400</span>
        <button id="btnClear" class="btn-clear" type="button">🧹 清空</button>
      </div>

      <div class="stage1">
        <button id="btnToCloud" class="btn-primary" type="button">
          <span class="ico">☁️</span>
          <span>丢给云朵</span>
        </button>
      </div>
    </section>

    <!-- 云朵舞台 -->
    <section class="stage" aria-label="情绪消化舞台">
      <div id="cloud" class="cloud" role="img" aria-label="一朵正在帮你消化坏情绪的云朵">
        <span class="bump" aria-hidden="true"></span>
        <div class="face" aria-hidden="true">
          <span class="eyes"><i></i><i></i></span>
          <span class="mouth"></span>
        </div>
        <span class="spark s1" aria-hidden="true"></span>
        <span class="spark s2" aria-hidden="true"></span>
        <span class="spark s3" aria-hidden="true"></span>
        <span class="spark s4" aria-hidden="true"></span>
        <span class="spark s5" aria-hidden="true"></span>
        <span class="spark s6" aria-hidden="true"></span>
      </div>

      <!-- Step 1: 安慰语气泡（默认隐藏） -->
      <div id="comfort" class="bubble-comfort hidden" aria-live="polite"></div>

      <!-- Step 2: 翻译按钮（默认隐藏） -->
      <button id="btnHearParents" class="stage2-btn hidden" type="button">
        🌱 我想听听爸妈真正的意思
      </button>

      <!-- 翻译结果卡（默认隐藏） -->
      <div id="cardResult" class="card card-result hidden" aria-label="爱的翻译结果">
        <div class="card-label"><span class="ico">💗</span><span>其实，TA 想说的是…</span></div>
        <div id="translation" class="quote"></div>
        <div id="originalBox" class="original"></div>
        <div class="again">
          <button id="btnRetranslate" class="btn-ghost" type="button">🔁 换一种说法</button>
          <button id="btnRestart"    class="btn-ghost" type="button">🌤️ 再写一句新的</button>
        </div>
      </div>
    </section>

    <!-- 底部成长足迹 -->
    <footer class="footer">
      <div class="growth" aria-live="polite">
        🌿 今天已消化 <span id="countNum" class="num">0</span> 份坏情绪
      </div>
      <p class="slogan">每一次被接住的情绪，都会变成明天更温柔的你 ✨</p>
    </footer>
  </main>

  <div id="toastHost" class="toast-host" aria-live="polite" aria-atomic="true"></div>

<script>
(function () {

      templates:[
        "他们盘问你「去哪跟谁几点回」，不是在审犯人，是从小怕你摔着碰着的那根神经从来没松过。你主动汇报一次行程，他们一整天心都是定的。",
        "爸妈眼里，你永远是那个过马路要牵着手的小朋友。不是不信任你，是世界真的有坏人，他们赌不起。心平气和地跟他们约好「每到一个地方发个定位」，矛盾就没了。",
        "「不许去」三个字，其实翻译过来是「我不在你身边，我害怕」。你把朋友带回家吃顿饭，让他们见见你的朋友们，下次再出门就没那么难了。",
      ]
    },
    {
      keys:["朋友","交什么人","同学","跟谁玩","不要跟","谈恋爱","拍拖","对象"],
      name:"交友 / 恋爱",
      templates:[
        "他们怕你交错朋友、怕你受欺负、怕你在爱情里吃亏，因为他们年轻时也摔过同样的跤。不是要限制你，是想把自己摔过的坑都替你填上。",
        "「不许早恋」是他们那一代人最安全的答案，可他们忘了，喜欢一个人本身就是一件特别美好的事。你愿意慢慢讲、他们愿意慢慢听——你们之间没有那么多不可调和。",
        "他们不是不信任你的眼光，是太想保护你那颗柔软的心了。把你的朋友或喜欢的人，用你最轻松的语气讲给他们听，通常事情就没那么糟。",
      ]
    },
    {
      keys:["为了你好","为你好","我是为你","还不都是"],
      name:"为你好",
      templates:[
        "「为你好」是他们那一代人最匮乏的表达：明明心里装着满满的爱，说出来却像一道命令。如果可以，轻轻回一句「我知道你们爱我，但可不可以换一种方式跟我说」？",
        "他们是真的觉得那样做你会少走弯路，只是忘了问你「这条路你想不想走」。别把这四个字当成枷锁——它其实是一个沉甸甸的、用错方式的拥抱。",
        "你不必为了「为你好」三个字就放弃自己的想法。你可以一边坚持自己，一边温柔地回一句「谢谢你们爱我，我心里知道」。爱，本来就不需要谁赢谁输。",
      ]
    },
  ];

  const FALLBACKS = [
    "爸妈的狠话，多半是情绪先跑了出来，话一出口他们自己就后悔了。真正藏在背后的，几乎总是同一句：我们太爱你，所以才会着急得说不出一句温柔的话。",
    "那句话里可能有失望、有疲惫、有他们自己当年没解开心结的影子，但唯独没有「不爱你」。家人之间最常见的误会，就是把最痛的话留给最亲的人听。",
    "你完全可以因为那句话生气、委屈，这都是真实的情绪。不过当你准备好的时候，不妨想一想：如果他们会说软话，那句狠话原本想讲什么？通常答案，就藏着爱。",
    "很多父母这辈子都没被温柔地对待过，所以他们也没学过怎么温柔地说话。你可以不原谅那句扎心的话，但请你记得——你值得被温柔，也值得重新被好好说一遍。",
    "那句伤人的话是真的，他们笨拙地爱着你也是真的。这两件事可以同时存在。先把情绪接住，再慢慢决定要不要沟通，这才是真正的「长大」呀。",
  ];

  // 小尾巴（随机 +1 条）
  const TAILS = [
    "今天的你也辛苦啦 🌼",
    "家人也是需要慢慢学习的 📖",
    "抱抱自己，你值得被好好对待 💗",
    "有些话没说出口，但爱一直都在 💕",
    "慢慢来，我们一起学习怎么相爱 🌈",
  ];

  function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
  function cleanInput(t){return (t||"").trim().replace(/[\s\u3000]+$/,"")}

  function translate(raw){
    const src = cleanInput(raw);
    if(!src) return {source:"", translation:"写一句难过的话，云朵才知道怎么帮你翻译呀～", scene:"空输入"};

    // 1) 精确匹配（去掉句末标点再比）
    const key = src.replace(/[。！？!?.，,\s]+$/,"");
    if(EXACT_MAP[src] || EXACT_MAP[key]){
      let tr = EXACT_MAP[src] || EXACT_MAP[key];
      tr += " " + pick(TAILS);
      return {source:src, translation:tr, scene:"精确映射"};
    }

    // 2) 场景关键词匹配
    const lowered = src.toLowerCase();
    let matched = null;
    for(const s of SCENES){
      if(s.keys.some(k => src.indexOf(k)>=0 || lowered.indexOf(k.toLowerCase())>=0)){
        matched = s; break;
      }
    }
    if(matched){
      const tr = pick(matched.templates) + " " + pick(TAILS);
      return {source:src, translation:tr, scene:matched.name};
    }

    // 3) 通用兜底
    const tr = pick(FALLBACKS) + " " + pick(TAILS);
    return {source:src, translation:tr, scene:"通用模式"};
  }

  // ============================================================
  // 3.5 增强交互：辅助动画函数
  // ============================================================
  /** 把字符串包装成逐字淡入的 <i class="ch">...</i>；返回 HTML 字符串 */
  function charWrap(text, baseDelay = 0, step = 32){
    const arr = [...String(text)];
    let out = "";
    for(let i=0;i<arr.length;i++){
      const ch = arr[i];
      if(/\s/.test(ch)){ out += ch; continue; }
      const d = baseDelay + i*step;
      out += `<i class="ch" style="animation-delay:${d}ms">${escapeHtml(ch)}</i>`;
    }
    return out;
  }
  /** 输入框错误时左右晃动一下 */
  function inputShakeOnce(){
    if(!el.input) return;
    el.input.classList.remove("is-shake");
    void el.input.offsetWidth;
    el.input.classList.add("is-shake");
    setTimeout(()=>el.input.classList.remove("is-shake"), 520);
  }
  /** 字数计数器弹跳一下 */
  function counterPopOnce(){
    const c = el.counter; if(!c) return;
    c.classList.remove("is-pop");
    void c.offsetWidth;
    c.classList.add("is-pop");
    setTimeout(()=>c.classList.remove("is-pop"), 520);
  }
  /** 云朵吃字时：加 eating class 让嘴巴开合动画，之后移除 */
  function cloudEatingAnim(){
    const c = el.cloud; if(!c) return;
    c.classList.remove("eating");
    void c.offsetWidth;
    c.classList.add("eating");
    setTimeout(()=>c.classList.remove("eating"), 860);
  }
  /** 彩虹火花重新爆发（每次 rainbow 类被加上后调用） */
  function restartSparkBurst(){
    const sparks = el.cloud.querySelectorAll(".spark");
    sparks.forEach(s=>{
      // 先把动画改成 none，触发 reflow，再清空让 CSS 的 sparkFly 重新播放
      s.style.animation = "none";
      // 移到下一层级先把计算后的样式强制刷出来，避免浏览器合并
      // eslint-disable-next-line no-unused-expressions
      s.offsetWidth;
      s.style.animation = "";
    });
  }
  /** 成长数字弹跳 + 飞出 6 颗小星星 */
  function growthBurst(){
    // 数字弹跳
    const n = el.countNum;
    if(n){
      n.classList.remove("pop");
      void n.offsetWidth;
      n.classList.add("pop");
      setTimeout(()=>n.classList.remove("pop"), 700);
    }
    // 飞星
    const growth = document.querySelector(".growth");
    if(!growth) return;
    // 清理历史残留（万一）
    growth.querySelectorAll(".fly-star").forEach(s=>s.remove());
    const glyphs = ["✨","⭐","🌟","💫","🌠","✦"];
    const count = 6;
    for(let i=0;i<count;i++){
      const s = document.createElement("span");
      s.className = "fly-star";
      s.textContent = glyphs[i % glyphs.length];
      // 6 个方向（扇形从左上 → 右上）
      const angleDeg = -110 + i * (90/(count-1)); // -110° 到 -20°
      const rad = angleDeg * Math.PI / 180;
      const dist = 56 + Math.random()*18;
      const sx = Math.cos(rad) * dist + "px";
      const sy = Math.sin(rad) * dist + "px";
      const sr = (Math.random()<0.5 ? -1 : 1) * (180 + Math.random()*180) + "deg";
      s.style.setProperty("--sx", sx);
      s.style.setProperty("--sy", sy);
      s.style.setProperty("--sr", sr);
      s.style.animationDelay = (i*40)+"ms";
      growth.appendChild(s);
      setTimeout(()=>s.remove(), 1200);
    }
  }
  /** 按钮点击时添加 ripple：使用事件委托（见启动部分），这里提供单独的方法 */
  function addRippleForBtn(btn, evt){
    if(!btn) return;
    const rect = btn.getBoundingClientRect();
    const x = (evt && typeof evt.clientX==="number") ? evt.clientX - rect.left : rect.width/2;
    const y = (evt && typeof evt.clientY==="number") ? evt.clientY - rect.top  : rect.height/2;
    const size = Math.max(rect.width, rect.height) * 1.2;
    const r = document.createElement("span");
    r.className = "ripple";
    r.style.left = (x - size/2) + "px";
    r.style.top  = (y - size/2) + "px";
    r.style.width  = size + "px";
    r.style.height = size + "px";
    btn.appendChild(r);
    setTimeout(()=>r.remove(), 720);
  }

  // ============================================================
  // 4. 「真实大模型 API 接入接口」 —— 保留完整模板，后续可启用
  //    要启用时，把下面 USE_LLM 改成 true，并填好 endpoint / apiKey。
  // ============================================================
  const LLM = {
    USE: false,   // ← 接入真实 API 时改为 true
    endpoint: "", // 例如："https://api.openai.com/v1/chat/completions"
    apiKey:   "", // 例如："sk-..." （纯前端仅本机演示用，切勿公网暴露）
    model:    "gpt-4o-mini",
    temperature: 0.8,
    maxTokens: 280,
    timeoutMs: 12000,
    systemPrompt:
      "你是一位温柔又专业的青少年心理咨询师，擅长把父母说的狠话、扎心的话，翻译成「父母真正想表达的爱」。" +
      "要求：1) 保留原话的真实背景，不许粉饰；2) 语气像一个温暖的哥哥/姐姐，说人话，不空洞、不鸡汤；" +
      "3) 字数 90~180 字；4) 只输出翻译后的温柔话语本身，不要加引号、不要加前缀。",
  };
  async function callLLM(src){
    // 以下为真实调用模板（当 USE=true 且填好 endpoint / apiKey 时生效）
    //
    // const ctrl = new AbortController();
    // const timer = setTimeout(()=>ctrl.abort(), LLM.timeoutMs);
    // try{
    //   const res = await fetch(LLM.endpoint, {
    //     method:"POST",
    //     headers:{"Content-Type":"application/json", Authorization:"Bearer "+LLM.apiKey},
    //     body: JSON.stringify({
    //       model: LLM.model,
    //       temperature: LLM.temperature,
    //       max_tokens: LLM.maxTokens,
    //       messages:[
    //         {role:"system", content: LLM.systemPrompt},
    //         {role:"user",   content: `请把下面这句父母/他人的狠话，翻译成真正的爱：\n"${src}"`}
    //       ]
    //     }),
    //     signal: ctrl.signal
    //   });
    //   if(!res.ok) throw new Error("HTTP_"+res.status);
    //   const data = await res.json();
    //   const text = data?.choices?.[0]?.message?.content || "";
    //   return text.trim().replace(/^["""']|["""']$/g,"").trim();
    // } finally { clearTimeout(timer); }
    void src;
    throw new Error("LLM_NOT_ENABLED");
  }

  // ============================================================
  // 5. 成长足迹（按日期计数，localStorage）
  // ============================================================
  const STORAGE_KEY = "emoStation_daily_v1";
  function todayStr(){
    const d=new Date();
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  }
  function loadCount(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return 0;
      const [d,c] = raw.split("|");
      if(d !== todayStr()) return 0;
      return Math.max(0, parseInt(c,10)||0);
    }catch{return 0}
  }
  function saveCount(c){
    try{ localStorage.setItem(STORAGE_KEY, todayStr()+"|"+Math.max(0,c|0)); }catch{}
  }
  function incCount(){
    const c = loadCount()+1;
    saveCount(c); renderCount(c);
    return c;
  }
  function renderCount(c){
    const n = el.countNum;
    n.textContent = String(c);
    n.animate(
      [{transform:"scale(1.35) rotate(-8deg)"},{transform:"scale(1) rotate(0)"}],
      {duration:420, easing:"cubic-bezier(.2,1.6,.4,1)"}
    );
  }

  // ============================================================
  // 6. Toast
  // ============================================================
  function toast(msg, type="info", ms=2200){
    const t = document.createElement("div");
    t.className = "toast toast--"+type;
    const icoMap = {info:"💜", ok:"💚", warn:"💛"};
    t.innerHTML = `<span>${icoMap[type]||"💜"}</span><span></span>`;
    t.lastChild.textContent = msg;
    el.toastHost.appendChild(t);
    requestAnimationFrame(()=>t.classList.add("is-in"));
    let gone=false;
    const rm = ()=>{
      if(gone) return; gone=true;
      t.classList.remove("is-in");
      setTimeout(()=>t.remove(), 320);
    };
    setTimeout(rm, ms);
    t.addEventListener("click", rm, {once:true});
  }

  // ============================================================
  // 7. 交互流程
  // ============================================================
  const state = {
    lastSource: "",
    lastTranslation: "",
  };

  function updateCounter(){
    const len = [...el.input.value].length;
    const max = 400;
    el.counter.textContent = `${len} / ${max}`;
    el.counter.classList.toggle("warn", len >= max*0.92);
    counterPopOnce();
  }
  el.input.addEventListener("input", updateCounter);
  el.input.addEventListener("keydown", e=>{
    if((e.ctrlKey||e.metaKey) && e.key==="Enter"){ e.preventDefault(); doStage1(); }
  });
  el.btnClear.addEventListener("click", ()=>{
    if(!el.input.value) return;
    el.input.value = ""; updateCounter();
    resetAll();
    toast("已清空，心里也干净一点啦 💜", "info", 1600);
  });

  // ---- Step 1：丢给云朵 ----
  el.btnToCloud.addEventListener("click", doStage1);

  function doStage1(){
    const src = cleanInput(el.input.value);
    if(!src){
      inputShakeOnce();
      toast("先把那句扎心的话写下来，云朵才能接住它哦～", "warn", 2400);
      el.input.focus({preventScroll:true}); return;
    }
    if([...src].length < 6){
      inputShakeOnce();
      toast("再多写几个字，让云朵更懂你的感受 🌼", "warn", 2400);
      el.input.focus({preventScroll:true}); return;
    }
    state.lastSource = src;

    // 1) 禁用按钮
    el.btnToCloud.disabled = true;
    // 2) 清空之前的结果/按钮
    el.comfort.classList.add("hidden");
    el.btnHear.classList.add("hidden");
    el.cardResult.classList.add("hidden");
    // 3) 云朵变灰，启动吃字动画（输入框文字先被吃）
    el.cloud.classList.remove("rainbow");
    el.input.classList.remove("is-eaten");
    // eslint-disable-next-line no-unused-expressions
    el.input.offsetWidth;
    el.input.classList.add("is-eaten");
    // 4) 云朵晃动 + 吃字嘴型
    el.cloud.classList.remove("shake","eating");
    // eslint-disable-next-line no-unused-expressions
    el.cloud.offsetWidth;
    el.cloud.classList.add("shake");
    cloudEatingAnim();

    // 晃到一半时，云朵变彩虹 + 安慰语弹出 + 火花
    setTimeout(()=>{
      el.cloud.classList.add("rainbow");
      showComfort();
      restartSparkBurst();
    }, 520);

    // 再等一会儿，出现 Step 2 按钮
    setTimeout(()=>{
      el.btnHear.classList.remove("hidden");
      el.btnToCloud.disabled = false;
    }, 1100);

    // 成长计数：每完成一步消化 +1，同时动画爆发
    const total = incCount();
    growthBurst();
    toast(`第 ${total} 份坏情绪，云朵帮你收走啦 🌈`, "ok", 2200);
  }

  function showComfort(){
    const c = pick(COMFORT_POOL);
    el.comfort.classList.add("hidden");
    // eslint-disable-next-line no-unused-expressions
    el.comfort.offsetWidth; // 重启动画
    el.comfort.classList.remove("hidden");
    el.comfort.innerHTML = "";
    const big = document.createElement("span");
    big.innerHTML = charWrap(c.text, 0, 48); // 逐字淡入
    const small = document.createElement("small");
    small.textContent = c.small;
    el.comfort.appendChild(big);
    el.comfort.appendChild(small);
  }

  // ---- Step 2：翻译父母真正的意思 ----
  el.btnHear.addEventListener("click", doStage2);
  el.btnRetrans.addEventListener("click", ()=>{
    if(!state.lastSource){ toast("先写一句话哦～", "warn", 1800); return; }
    doStage2();
  });
  el.btnRestart.addEventListener("click", ()=>{
    el.input.value = "";
    updateCounter();
    resetAll();
    toast("新的一页已经翻开，继续写吧 ☀️", "info", 1800);
    setTimeout(()=>el.input.focus({preventScroll:true}), 100);
  });

  async function doStage2(){
    if(!state.lastSource){ toast("先把话丢给云朵呀 ☁️", "warn", 2000); return; }
    el.btnHear.disabled = true;
    el.btnRetrans.disabled = true;
    el.cardResult.classList.add("hidden");
    el.translation.textContent = "……";
    el.originalBox.innerHTML = "";

    // 先显示骨架感：稍微延迟一下，模拟「在听」
    setTimeout(async ()=>{
      let res;
      // 先尝试大模型（如果启用）
      try{
        if(LLM.USE && LLM.endpoint && LLM.apiKey){
          const tr = await callLLM(state.lastSource);
          res = {source:state.lastSource, translation:tr, scene:"大模型翻译"};
        }else{
          throw new Error("USE_LOCAL");
        }
      }catch{
        res = translate(state.lastSource);
      }
      state.lastTranslation = res.translation;
      renderResult(res);
      el.btnHear.disabled = false;
      el.btnRetrans.disabled = false;
      toast("翻译好啦～点一下换一种说法也可以哦 💗","ok",2000);
    }, 380);
  }

  function renderResult(res){
    el.cardResult.classList.remove("hidden");
    // 重新触发淡入动画
    const q = el.translation;
    q.style.animation = "none";
    // eslint-disable-next-line no-unused-expressions
    q.offsetWidth;
    q.style.animation = "";
    q.innerHTML = charWrap(res.translation, 40, 20); // 逐字淡入

    el.originalBox.innerHTML = `<b>🗣️ 原话：</b>${escapeHtml(res.source)} <span class="tag-scene">场景：${escapeHtml(res.scene)}</span>`;

    // 让卡片滑入视野
    el.cardResult.scrollIntoView({behavior:"smooth", block:"nearest", inline:"nearest"});
  }

  function escapeHtml(s){return String(s).replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}

  function resetAll(){
    el.cloud.classList.remove("rainbow","shake");
    el.comfort.classList.add("hidden");
    el.btnHear.classList.add("hidden");
    el.cardResult.classList.add("hidden");
    el.input.classList.remove("is-eaten");
    state.lastSource = ""; state.lastTranslation = "";
  }

  // ============================================================
  // 8. 启动
  // ============================================================
  updateCounter();
  renderCount(loadCount());
  try{ el.input.focus({preventScroll:true}); }catch{}

  // ----- 增强动画：分步入场 + 全局 Ripple 事件委托 -----
  // 下一帧再加 is-ready，确保初始隐藏已应用后开始 staggerIn
  try{
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=> document.body.classList.add("is-ready"));
    });
  }catch{ document.body.classList.add("is-ready"); }

  // 按钮点击产生水波 Ripple（所有 btn-primary/stage2-btn/btn-ghost/btn-clear）
  document.addEventListener("click", (evt)=>{
    const t = evt.target;
    if(!t) return;
    const btn = t.closest && t.closest(".btn-primary, .stage2-btn, .btn-ghost, .btn-clear");
    if(btn) addRippleForBtn(btn, evt);
  }, true);

  // 为后续真实 API 接入预留：暴露到全局以便调试
  window.__emoStation = { translate, callLLM, incCount, loadCount };
})();
</script>
